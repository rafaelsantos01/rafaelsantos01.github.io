                    <br>
                    <br>
                    </section>

                    <input type="text" name="name" placeholder="Nome" required="required" >

                    <input type="checkbox" name="dia-da-semana" value=3 >Terça-Feira
                    <input type="checkbox" name="dia-da-semana" value=4 >Quarta-Feira 
                    <input type="checkbox" name="dia-da-semana" value=5 >Quinta-Feira
                    <input type="checkbox" name="dia-da-semana" value=6 >Sexta-Feira <br><br>
                    <input type="radio" name="horario" value="Manha">Manhã
                    <input type="radio" name="horario" value="Tarde">Tarde
                    <input type="radio" name="horario" value="Noite">Noite <br><br>
                    Mensagem
                    <div class="mensagem-area">
                        
                        <textarea name="" id=""></textarea>

                        </textarea> <br>
                        
                    </div>
